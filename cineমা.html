<!DOCTYPE html>
<html>
<head>
  <title>cineমা</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', sans-serif;
      color: white;

      background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)),
      url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');
      background-size: cover;
      background-position: center;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    /* GRID CONTAINER */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    /* MOVIE CARD */
    .card {
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.08);
      border-radius: 15px;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 230px;
      object-fit: cover;
    }

    .content {
      padding: 10px;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
    }

    .rating {
      color: #ffd700;
      font-size: 13px;
      margin-top: 3px;
    }

    .review {
      font-size: 12px;
      color: #ccc;
      margin-top: 5px;
    }

    /* BACK BUTTON */
    .back {
      display: block;
      text-align: center;
      margin-top: 25px;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
    }

    .back:hover {
      color: white;
    }
  </style>

</head>

<body>

  <h1>cineমা 🎬</h1>

  <div class="container">

    <!-- MOVIE 1 -->
    <div class="card">
      <img src="https://m.media-amazon.com/images/I/91kFYg4fX3L._AC_SL1500_.jpg">
      <div class="content">
        <div class="title">Interstellar</div>
        <div class="rating">⭐ 9/10</div>
        <div class="review">Space, time and emotions perfectly blended.</div>
      </div>
    </div>

  <div class="card">
  <img src="https://en.wikipedia.org/wiki/Inception">
  <div class="content">
    <div class="title">Inception</div>
    <div class="rating">⭐ 8/10</div>
    <div class="review">Kaboom...</div>
  </div>
  </div>

    <!-- ADD NEW MOVIES BELOW THIS -->

  </div>

  <a href="index.html" class="back">← Back to Timeলাইন</a>

</body>
</html>
