<!DOCTYPE html>
<html>
<head>
  <title>বইপত্র</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Georgia, serif;
      color: #f5f5f5;

      background: linear-gradient(rgba(20,10,5,0.8), rgba(10,5,2,0.95)),
      url('https://images.unsplash.com/photo-1512820790803-83ca734da794');
      background-size: cover;
      background-position: center;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: #ccc;
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* GRID */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    /* CARD */
    .card {
      background: rgba(255, 248, 220, 0.08);
      border-radius: 12px;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 230px;
      object-fit: cover;
    }

    .content {
      padding: 10px;
    }

    .title {
      font-size: 15px;
      font-weight: bold;
    }

    .rating {
      color: #ffd700;
      font-size: 13px;
      margin-top: 3px;
    }

    .review {
      font-size: 12px;
      color: #ddd;
      margin-top: 5px;
      font-style: italic;
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 25px;
      color: #aaa;
      text-decoration: none;
    }

    .back:hover {
      color: white;
    }
  </style>

</head>

<body>

  <h1>বইপত্র 📚</h1>
  <p class="subtitle">A quiet collection of thoughts bound in pages</p>

  <div class="container">

    <!-- BOOK 1 -->
    <div class="card">
      <img src="https://m.media-amazon.com/images/I/81p+xe8cbnL._AC_UF1000,1000_QL80_.jpg">
      <div class="content">
        <div class="title">The Alchemist</div>
        <div class="rating">⭐ 8/10</div>
        <div class="review">A simple story with deep meaning about destiny.</div>
      </div>
    </div>

    <!-- ADD MORE BOOKS BELOW -->

  </div>

  <a href="index.html" class="back">← Back to Timeলাইন</a>

</body>
</html>
