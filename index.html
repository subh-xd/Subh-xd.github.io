<!DOCTYPE html>
<html>
<head>
  <title>Timeলাইন</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      text-align: center;

      /* GRADIENT BACKGROUND */
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      height: 100vh;
    }

    .container {
      padding: 30px 20px;
    }

    /* PROFILE IMAGE */
    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-top: 30px;
      border: 2px solid rgba(255,255,255,0.3);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    h1 {
      margin-top: 15px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    p {
      color: #ddd;
      max-width: 300px;
      margin: auto;
      font-size: 14px;
    }

    /* BUTTON GRID */
    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 300px;
      margin: 30px auto;
    }

    .btn {
      padding: 14px;
      border-radius: 15px;
      text-decoration: none;
      color: white;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .btn:hover {
      transform: scale(1.08);
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    /* WRITING BOX */
    .writing-box {
      margin-top: 40px;
      padding: 15px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.08);
      max-width: 350px;
      margin-left: auto;
      margin-right: auto;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    h3 {
      margin-bottom: 5px;
    }

    /* SMALL ANIMATION */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      animation: fadeIn 1.2s ease;
    }
  </style>

</head>

<body>

  <div class="container">

    <!-- PROFILE -->
    <img src="subh.jpg">

    <h1>Timeলাইন | Subh </h1>

    </p>

    <!-- BUTTONS -->

      <a href="চিন্তাধারা.html" class="btn">✍️ চিন্তাধারা</a>
    </div>

    <!-- WRITING -->
    <div class="writing-box">
      <h3> Eyesight ✍️</h3>
